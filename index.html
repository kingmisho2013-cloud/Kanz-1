const detectLocale=()=>{try{return (navigator.language||"ar").toLowerCase().startsWith("en")?"en":"ar";}catch{return "ar";}};
const prefersDark=()=>{try{return matchMedia("(prefers-color-scheme: dark)").matches;}catch{return false;}};
const prefersReduced=()=>{try{return matchMedia("(prefers-reduced-motion: reduce)").matches;}catch{return false;}};
const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

const fmts={};
function buildFmt(locale){
  if(fmts[locale])return fmts[locale];
  const tag=locale==="ar"?"ar-EG":"en-EG";
  const cur=new Intl.NumberFormat(tag,{style:"currency",currency:"EGP",maximumFractionDigits:0});
  const int=new Intl.NumberFormat(tag);
  const two=new Intl.NumberFormat(tag,{minimumIntegerDigits:2});
  fmts[locale]={cur:v=>cur.format(v),int:v=>int.format(v),two:v=>two.format(v)};
  return fmts[locale];
}

  let s="";for(let i=1;i<=5;i++)s+=ic("star",13,1.5,`color:var(--star);fill:${i<=Math.round(rating)?"var(--star)":"transparent"}`);
  return `<div class="flex items-center gap-1"><span class="flex items-center gap-1">${s}</span><span class="text-xs" style="color:var(--link)">${fmt.int(reviews)}</span></div>`;
}

  const cards=S.loaded?TOP_PICKS.map(p=>productCard(p,t,fmt,false)).join(""):Array.from({length:6}).map(skeletonCard).join("");
  return `<section class="max-w-screen-2xl mx-auto px-3 sm:px-4 mt-6"><div class="rounded-xl p-5" style="background:var(--surface);box-shadow:var(--shadow)">
    <div class="flex items-baseline gap-4 mb-4"><h2 class="text-xl font-extrabold" style="color:var(--ink)">${esc(t.topPicksTitle)}</h2><button class="focusable text-sm font-bold hover:underline" style="color:var(--link)">${esc(t.explore)}</button></div>
    ${shoveler("picksShov",cards,t.heroPrev,t.heroNext)}</div></section>`;
}
function footerHTML(t,fmt){
  const L=S.locale;
  return `<footer class="mt-10">
    <button id="toTop" class="focusable w-full py-3.5 text-sm font-extrabold flex items-center justify-center gap-2" style="background:var(--lapis-2);color:var(--nav-ink)">${ic("arrow-up",16)} ${esc(t.footTop)}</button>
    <div style="background:var(--lapis);color:var(--nav-ink)">
      <div class="max-w-screen-2xl mx-auto px-4 py-10 grid grid-cols-2 md:grid-cols-4 gap-8">
        ${t.footCols.map(col=>`<nav aria-label="${esc(col.h)}"><h3 class="text-sm font-extrabold mb-3">${esc(col.h)}</h3>${col.l.map(li=>`<button class="focusable block text-[13px] opacity-75 hover:opacity-100 hover:underline py-1 text-start">${esc(li)}</button>`).join("")}</nav>`).join("")}
      </div>
      <div class="max-w-screen-2xl mx-auto px-4 pb-8 flex flex-wrap items-center justify-center gap-3" style="border-top:1px solid rgba(253,246,231,.12);padding-top:1.5rem">
        ${starSealMini()}<span class="font-black text-lg">${esc(t.brand)}</span>
        <button id="footLang" class="focusable flex items-center gap-1.5 rounded-full px-3 py-1 text-xs font-bold" style="border:1px solid rgba(253,246,231,.3)">${ic("globe",13)} ${L==="ar"?"العربية":"English"}</button>
        <span class="rounded-full px-3 py-1 text-xs font-bold" style="border:1px solid rgba(253,246,231,.3)">EGP — ج.م</span>
        <span class="rounded-full px-3 py-1 text-xs font-bold" style="border:1px solid rgba(253,246,231,.3)">🇪🇬 ${esc(t.country)}</span>
      </div>
      <p class="text-center text-[11px] opacity-60 pb-6 px-4">${esc(t.rights.replace("{y}",fmt.int(new Date().getFullYear())))} · ${esc(t.tagline)}</p>
    </div></footer>`;
}

/* --------------------------------- Search ---------------------------------- */
function searchPool(){
  const L=S.locale;
  return [...CATEGORIES,...EXTRA_CATEGORIES].map(c=>c[L]).concat([...DEAL_PRODUCTS,...TOP_PICKS].map(p=>p[L]));
}
function searchMatches(){
  const v=S.search.trim();if(!v)return [];
  return searchPool().filter(s=>s.includes(v)).slice(0,7);
}

/* ---------------------------------- Toast ---------------------------------- */
function showToast(msg){
  let el=document.getElementById("toast");
  if(!el){el=document.createElement("div");el.id="toast";el.setAttribute("role","status");el.setAttribute("aria-live","polite");
    el.className="fixed bottom-5 inset-x-0 mx-auto w-max max-w-[92vw] z-50 rounded-full px-5 py-2.5 text-sm font-extrabold";document.body.appendChild(el);}
  el.style.cssText+="background:var(--lapis);color:var(--nav-ink);box-shadow:var(--shadow)";
  el.textContent=msg;el.style.display="";
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.style.display="none",2200);
}

/* --------------------------------- Countdown ------------------------------- */
function tickCountdown(){
  const el=document.getElementById("countdown");if(!el)return;
  const fmt=buildFmt(S.locale);const end=new Date();end.setHours(23,59,59,999);
  const s=Math.max(0,Math.floor((end.getTime()-Date.now())/1000));
  el.textContent=`${fmt.two(Math.floor(s/3600))}:${fmt.two(Math.floor((s%3600)/60))}:${fmt.two(s%60)}`;
}

/* ----------------------------------- Hero ---------------------------------- */
function heroGoto(k){const n=HERO_SLIDES.length;S.hero=(k+n)%n;const tr=document.getElementById("heroTrack");if(tr)tr.style.transform=`translateX(-${S.hero*100}%)`;
  document.querySelectorAll("[data-dot]").forEach((b,i)=>{b.style.background=i===S.hero?"var(--gold)":"rgba(253,246,231,.45)";b.style.width=(i===S.hero?22:10)+"px";});}
function startHero(){clearInterval(heroTimer);if(prefersReduced())return;heroTimer=setInterval(()=>{if(!S.heroPaused)heroGoto(S.hero+1);},6000);}

/* ---------------------------------- Render --------------------------------- */
function render(){
  const t=M[S.locale],fmt=buildFmt(S.locale),dir=S.locale==="ar"?"rtl":"ltr";
  document.documentElement.dir=dir;document.documentElement.lang=S.locale;
  const root=document.getElementById("root");
  const vars=Object.entries(THEMES[S.theme]).map(([k,v])=>`${k}:${v}`).join(";");
  root.setAttribute("style",`${vars};background:var(--bg);color:var(--ink)`);
  root.innerHTML=`
    <a href="#main" class="sr-only focus:not-sr-only focus:absolute focus:z-50 focus:m-2 focus:rounded-lg focus:px-4 focus:py-2 focus:text-sm focus:font-bold" style="background:var(--gold);color:var(--gold-ink)">${S.locale==="ar"?"تخطَّ إلى المحتوى":"Skip to content"}</a>
    <header class="sticky top-0 z-30">${headerHTML(t,fmt)}${navHTML(t)}</header>
    ${drawerHTML(t)}
    <main id="main">${heroHTML(t)}${overlapRow(t)}${trendRow(t)}${dealBand(t,fmt)}${medallionStrip(t,fmt)}${essentialsRow(t)}${topPicks(t,fmt)}</main>
    ${footerHTML(t,fmt)}`;
  lucide.createIcons();
  wire();
  tickCountdown();
  startHero();
  const inp=document.getElementById("searchInput");
  if(inp&&S.searchOpen){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);}
}

function reRenderKeepScroll(){const y=scrollX,x=scrollY;render();scrollTo(y,x);}

/* --------------------------------- Wiring ---------------------------------- */
function wire(){
  const t=M[S.locale];
  const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
  $("#langBtn")?.addEventListener("click",()=>{S.locale=S.locale==="ar"?"en":"ar";render();});
  $("#footLang")?.addEventListener("click",()=>{S.locale=S.locale==="ar"?"en":"ar";render();});
  $("#themeBtn")?.addEventListener("click",()=>{S.theme=S.theme==="light"?"dark":"light";render();});
  $("#navMenu")?.addEventListener("click",()=>{S.drawer=true;S.drawerPanel=null;S.drawerShowAll=false;render();});
  $("#drawerClose")?.addEventListener("click",()=>{S.drawer=false;render();});
  $("#drawerScrim")?.addEventListener("click",()=>{S.drawer=false;render();});
  $("#drawerShowAll")?.addEventListener("click",()=>{S.drawerShowAll=!S.drawerShowAll;render();});
  $$("[data-panel]").forEach(b=>b.addEventListener("click",()=>{S.drawerPanel=b.getAttribute("data-panel")||null;render();}));
  $$("[data-act]").forEach(b=>b.addEventListener("click",()=>{const a=b.getAttribute("data-act");if(a==="lang")S.locale=S.locale==="ar"?"en":"ar";else S.theme=S.theme==="light"?"dark":"light";render();}));

  $("#acctBtn")?.addEventListener("click",e=>{e.stopPropagation();S.acctOpen=!S.acctOpen;reRenderKeepScroll();});

  $$("[data-hero]").forEach(b=>b.addEventListener("click",()=>heroGoto(S.hero+ +b.getAttribute("data-hero"))));
  $$("[data-dot]").forEach(b=>b.addEventListener("click",()=>heroGoto(+b.getAttribute("data-dot"))));
  const hero=$("#hero");if(hero){["mouseenter","focusin"].forEach(ev=>hero.addEventListener(ev,()=>S.heroPaused=true));["mouseleave","focusout"].forEach(ev=>hero.addEventListener(ev,()=>S.heroPaused=false));}

  $$("[data-shov]").forEach(b=>b.addEventListener("click",()=>{const el=document.getElementById(b.getAttribute("data-shov"));if(!el)return;const rtl=getComputedStyle(el).direction==="rtl";el.scrollBy({left:(+b.getAttribute("data-dir"))*(rtl?-1:1)*el.clientWidth*0.85,behavior:prefersReduced()?"auto":"smooth"});}));

  $$("[data-add]").forEach(b=>b.addEventListener("click",()=>{const id=+b.getAttribute("data-add");const p=[...DEAL_PRODUCTS,...TOP_PICKS].find(x=>x.id===id);S.cart++;const cc=document.getElementById("cartCount");if(cc)cc.textContent=buildFmt(S.locale).int(S.cart);showToast(`${t.added} — ${p[S.locale]}`);}));

  $("#toTop")?.addEventListener("click",()=>scrollTo({top:0,behavior:prefersReduced()?"auto":"smooth"}));

  const inp=$("#searchInput"),go=$("#searchGo");
  const commit=v=>{S.search=v;S.searchOpen=false;S.searchActive=-1;reRenderKeepScroll();showToast(S.locale==="ar"?`نتايج «${v}» جاية في مرحلة الـ PLP`:`"${v}" results ship in the PLP phase`);};
  inp?.addEventListener("input",e=>{S.search=e.target.value;S.searchOpen=true;S.searchActive=-1;reRenderKeepScroll();});
  inp?.addEventListener("focus",()=>{if(S.search){S.searchOpen=true;reRenderKeepScroll();}});
  inp?.addEventListener("keydown",e=>{const m=searchMatches();
    if(!S.searchOpen&&(e.key==="ArrowDown"||e.key==="ArrowUp")){S.searchOpen=true;reRenderKeepScroll();return;}
    if(e.key==="ArrowDown"){e.preventDefault();S.searchActive=Math.min(S.searchActive+1,m.length-1);reRenderKeepScroll();}
    else if(e.key==="ArrowUp"){e.preventDefault();S.searchActive=Math.max(S.searchActive-1,-1);reRenderKeepScroll();}
    else if(e.key==="Enter"){commit(S.searchActive>=0&&m[S.searchActive]?m[S.searchActive]:S.search);}
    else if(e.key==="Escape"){S.searchOpen=false;S.searchActive=-1;reRenderKeepScroll();}});
  go?.addEventListener("click",()=>S.search&&commit(S.search));
  $$("[data-sopt]").forEach(b=>b.addEventListener("mousedown",()=>commit(b.getAttribute("data-sopt"))));
}

/* Global listeners */
document.addEventListener("mousedown",e=>{
  const sb=document.getElementById("searchBox"),ab=document.getElementById("acctBox");
  let changed=false;
  if(S.searchOpen&&sb&&!sb.contains(e.target)){S.searchOpen=false;changed=true;}
  if(S.acctOpen&&ab&&!ab.contains(e.target)){S.acctOpen=false;changed=true;}
  if(changed)reRenderKeepScroll();
});
document.addEventListener("keydown",e=>{if(e.key==="Escape"&&S.drawer){S.drawer=false;render();}});

/* Boot */
render();
countdownTimer=setInterval(tickCountdown,1000);
setTimeout(()=>{S.loaded=true;reRenderKeepScroll();},800);
</script>
</body>
</html>
